<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Admin - KontrakanMaps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <!-- LOGIN BOX -->
    <div id="login-box" class="w-full max-w-sm bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
        <div class="text-center mb-6">
            <i class="fa-solid fa-lock text-3xl text-indigo-400 mb-2"></i>
            <h1 class="text-xl font-black text-white">Admin Login</h1>
        </div>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="text-xs text-slate-300 font-semibold block mb-1">Username</label>
                <input type="text" id="username" required placeholder="admin" class="w-full bg-slate-700 border border-slate-600 p-2.5 rounded-xl text-sm text-white focus:outline-none">
            </div>
            <div>
                <label class="text-xs text-slate-300 font-semibold block mb-1">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full bg-slate-700 border border-slate-600 p-2.5 rounded-xl text-sm text-white focus:outline-none">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-sm shadow-md">Masuk Dashboard</button>
        </form>
    </div>

    <!-- DASHBOARD PANEL -->
    <div id="admin-dashboard" class="w-full max-w-4xl bg-slate-800 rounded-2xl border border-slate-700 p-5 shadow-2xl hidden my-4">
        <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-5">
            <h1 class="text-lg font-black text-white flex items-center gap-2"><i class="fa-solid fa-sliders text-indigo-400"></i> Panel Admin (Upload File Foto)</h1>
            <button onclick="location.reload()" class="bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg">Logout</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <!-- Form Tambah -->
            <div class="md:col-span-1 bg-slate-700/30 p-4 rounded-xl border border-slate-700/60 h-fit space-y-3">
                <h2 class="text-sm font-bold text-white border-b border-slate-700 pb-1.5"><i class="fa-solid fa-circle-plus text-emerald-400"></i> Tambah Unit</h2>
                <form id="add-property-form" class="space-y-3 text-slate-200">
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-0.5">Nama Unit</label>
                        <input type="text" id="prop-name" required placeholder="Contoh: Kamar 05 AC" class="w-full bg-slate-700 border border-slate-600 p-2 rounded-lg text-xs text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-0.5">Harga Bulanan</label>
                        <input type="number" id="prop-price" required placeholder="600000" class="w-full bg-slate-700 border border-slate-600 p-2 rounded-lg text-xs text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-0.5">Kategori</label>
                        <input type="text" id="prop-category" required placeholder="Kamar Mandi Dalam" class="w-full bg-slate-700 border border-slate-600 p-2 rounded-lg text-xs text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-indigo-300 font-bold block mb-0.5">📤 Upload Foto Kontrakan (Bisa Banyak):</label>
                        <input type="file" id="prop-files" multiple accept="image/*" class="w-full bg-slate-700 border border-slate-600 p-1.5 rounded-lg text-xs text-white focus:outline-none file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-[11px] file:bg-indigo-600 file:text-white cursor-pointer">
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400 block mb-0.5">Fasilitas Lengkap</label>
                        <textarea id="prop-desc" required placeholder="Fasilitas kasur, wifi..." class="w-full bg-slate-700 border border-slate-600 p-2 rounded-lg text-xs text-white h-16 focus:outline-none"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg text-xs">Publish Unit Baru</button>
                </form>
            </div>

            <!-- List Inventori -->
            <div class="md:col-span-2 space-y-3">
                <h2 class="text-sm font-bold text-white border-b border-slate-700 pb-1.5"><i class="fa-solid fa-boxes-stacked text-indigo-400"></i> Inventori Unit</h2>
                <div id="admin-properties-list" class="max-h-[580px] overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
