<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control Admin - KontrakanMaps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="login-box" class="w-full max-w-sm bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
        <div class="text-center mb-6">
            <i class="fa-solid fa-lock text-3xl text-indigo-400 mb-2"></i>
            <h1 class="text-xl font-black text-white">Admin Login</h1>
        </div>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="text-xs text-slate-300 font-semibold block mb-1">Username</label>
                <input type="text" id="username" required placeholder="admin" class="w-full bg-slate-700 border border-slate-600 p-2.5 rounded-xl text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="text-xs text-slate-300 font-semibold block mb-1">Password</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full bg-slate-700 border border-slate-600 p-2.5 rounded-xl text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-sm shadow-md transition-all">Masuk Dashboard</button>
        </form>
    </div>

    <div id="admin-dashboard" class="w-full max-w-4xl bg-slate-800 rounded-2xl border border-slate-700 p-5 shadow-2xl hidden my-4">
        <div class="flex justify-between items-center border-b border-slate-700 pb-4 mb-5">
            <div>
                <h1 class="text-lg font-black text-white flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-indigo-400"></i> Penguasa Panel Admin
                </h1>
                <p class="text-xs text-slate-400">Tambah, ubah data harga/fasilitas, dan hapus unit langsung dari sini</p>
            </div>
            <button onclick="location.reload()" class="bg-rose-600 hover:bg-rose-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg transition-all">Logout <i class="fa-solid fa-right-from-bracket ml-1"></i></button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div class="md:col-span-1 bg-slate-700/30 p-4 rounded-xl border border-slate-700/60 h-fit space-y-3">
                <h2 class="text-sm font-bold text-white border-b border-slate-700 pb-1.5 flex items-center gap-1.5">
                    <i class="fa-solid fa-circle-plus text-emerald-400"></i> Tambah Unit Baru
                </h2>
                <form id="add-property-form" class="space-y-3 text-slate-200">
                    <div>
                        <label class="text- text-slate-400 block mb-0.5">Nama Kamar / Unit</label>
                        <input type="text" id="prop-name" required placeholder="Contoh: Kamar AC No 05" class="w-full bg-slate-700 border border-slate-600 p-2 rounded-lg text-xs text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="text- text-slate-400 block mb-0.5">Harga Sewa Bulanan (Angka Saja)</label>
                        <input type="number" id="prop-price" required placeholder="650000" class="w-full bg-slate-700 border border-slate-600 p-2 rounded-lg text-xs text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="text- text-slate-400 block mb-0.5">Kategori Fasilitas</label>
                        <input type="text" id="prop-category" required placeholder="Contoh: Kamar Mandi Dalam / AC" class="w-full bg-slate-700 border border-slate-600 p-2 rounded-lg text-xs text-white focus:outline-none">
                    </div>
                    
                    <div>
                        <label class="text- text-indigo-300 font-bold block mb-0.5">📸 Upload Foto Kontrakan (Bisa Pilih Banyak):</label>
                        <input type="file" id="prop-files" multiple accept="image/*" class="w-full bg-slate-700 border border-slate-600 p-1.5 rounded-lg text-xs text-white cursor-pointer file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text- file:bg-indigo-600 file:text-white">
                        <div id="preview-foto" class="flex gap-2 mt-2 flex-wrap"></div>
                    </div>

                    <div>
                        <label class="text- text-slate-400 block mb-0.5">Fasilitas Lengkap / Deskripsi</label>
                        <textarea id="prop-desc" required placeholder="Sebutkan kasur, lemari, listrik token, dll..." class="w-full bg-slate-700 border border-slate-600 p-2 rounded-lg text-xs text-white h-20 focus:outline-none"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg text-xs transition-all shadow-md">Publish Unit Kontrakan</button>
                </form>
            </div>

            <div class="md:col-span-2 space-y-3">
                <h2 class="text-sm font-bold text-white border-b border-slate-700 pb-1.5 flex items-center gap-1.5">
                    <i class="fa-solid fa-boxes-stacked text-indigo-400"></i> Inventori Unit Website Anda
                </h2>
                <div id="admin-properties-list" class="max-h- overflow-y-auto pr-1 space-y-3"></div>
            </div>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.getElementById('login-form');
    const loginBox = document.getElementById('login-box');
    const dashboard = document.getElementById('admin-dashboard');
    const addForm = document.getElementById('add-property-form');
    const fileInput = document.getElementById('prop-files');
    const previewContainer = document.getElementById('preview-foto');
    const listContainer = document.getElementById('admin-properties-list');

    let properties = JSON.parse(localStorage.getItem('kontrakanData')) || [];
    let tempImages = [];

    // LOGIN - GANTI USERNAME & PASSWORD DI SINI
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        if (user === 'admin' && pass === 'admin123') {
            loginBox.classList.add('hidden');
            dashboard.classList.remove('hidden');
            renderList();
        } else {
            alert('Username / Password salah bang!');
        }
    });

    // PREVIEW FOTO
    fileInput.addEventListener('change', async () => {
        previewContainer.innerHTML = '';
        tempImages = [];
        for (const file of fileInput.files) {
            const base64 = await toBase64(file);
            tempImages.push(base64);
            previewContainer.innerHTML += `<img src="${base64}" class="w-16 h-16 object-cover rounded-lg border border-slate-600"><button type="button" onclick="hapusFotoPreview(${tempImages.length-1})" class="text-rose-500 text-xs -ml-2 -mt-1"><i class="fa-solid fa-circle-xmark"></i></button>`;
        }
    });

    window.hapusFotoPreview = (index) => {
        tempImages.splice(index, 1);
        // Refresh preview
        previewContainer.innerHTML = '';
        tempImages.forEach((img, i) => {
            previewContainer.innerHTML += `<img src="${img}" class="w-16 h-16 object-cover rounded-lg border border-slate-600"><button type="button" onclick="hapusFotoPreview(${i})" class="text-rose-500 text-xs -ml-2 -mt-1"><i class="fa-solid fa-circle-xmark"></i></button>`;
        });
    }

    // SUBMIT TAMBAH UNIT
    addForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (tempImages.length === 0) return alert('Upload minimal 1 foto bang');
        
        const newUnit = {
            id: Date.now(),
            name: document.getElementById('prop-name').value,
            price: document.getElementById('prop-price').value,
            category: document.getElementById('prop-category').value,
            desc: document.getElementById('prop-desc').value,
            images: tempImages,
            lat: -6.3227 + (Math.random()-0.5)*0.02, // Random lokasi Karawang
            lng: 107.3376 + (Math.random()-0.5)*0.02
        };

        properties.unshift(newUnit);
        localStorage.setItem('kontrakanData', JSON.stringify(properties));
        
        addForm.reset(); 
        previewContainer.innerHTML = ''; 
        tempImages = [];
        renderList(); 
        alert('Unit berhasil dipublish! Cek index.html');
    });

    // RENDER LIST
    function renderList() {
        listContainer.innerHTML = '';
        if (properties.length === 0) return listContainer.innerHTML = '<p class="text-xs text-slate-500 text-center py-4">Belum ada unit. Tambah dulu bang.</p>';
        
        properties.forEach(prop => {
            const firstImg = prop.images && prop.images.length > 0? prop.images[0] : 'https://placehold.co/80x80/334155/white?text=No+Img';
            listContainer.innerHTML += `
                <div class="bg-slate-700/50 p-3 rounded-xl border border-slate-700 flex gap-3">
                    <img src="${firstImg}" class="w-20 h-20 object-cover rounded-lg flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-sm font-bold text-white truncate">${prop.name}</h3>
                                <p class="text-xs text-indigo-400">Kategori: ${prop.category}</p>
                            </div>
                            <button onclick="hapusUnit(${prop.id})" class="text-rose-500 hover:text-rose-400 ml-2 text-xs font-bold px-2 py-1 rounded bg-rose-500/20"><i class="fa-solid fa-trash"></i> Hapus</button>
                        </div>
                        <p class="text-xs text-emerald-400 font-semibold mt-1">Rp ${Number(prop.price).toLocaleString('id-ID')} / bulan</p>
                        <p class="text- text-slate-300 mt-1 line-clamp-2">Fasilitas: ${prop.desc}</p>
                        <p class="text- text-indigo-400 mt-1">${prop.images.length} Foto</p>
                    </div>
                </div>`;
        });
    }

    window.hapusUnit = (id) => {
        if (confirm('Yakin mau hapus unit ini?')) {
            properties = properties.filter(p => p.id!== id);
            localStorage.setItem('kontrakanData', JSON.stringify(properties));
            renderList();
        }
    };

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    renderList();
});
</script>
</body>
</html>
