<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KontrakanMaps - Cari Lokasi Kontrakan Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
       .leaflet-container { z-index: 1!important; }
        header { z-index: 10!important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <header class="bg-white border-b border-slate-200 sticky top-0 px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-indigo-600 flex items-center gap-2">
                <i class="fa-solid fa-location-dot text-red-500"></i> KontrakanMaps
            </h1>
            <span class="bg-rose-50 text-rose-600 text-xs font-bold px-3 py-1.5 rounded-full flex items-center gap-1">
                Lokasi Realtime Karawang <i class="fa-solid fa-thumbtack text-rose-400"></i>
            </span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-6">
        <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div id="map" class="w-full h-[380px] rounded-xl"></div>
        </div>

        <div>
            <h2 class="text-lg font-extrabold text-slate-800 border-l-4 border-indigo-600 pl-2 mb-4">
                Unit Rekomendasi Kontrakan
            </h2>
            <div id="properties-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="form-booking" class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm max-w-lg mx-auto">
            <h2 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
                📋 Form Booking & Survei Kontrakan
            </h2>
            <form id="booking-form-wa" class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-600 block mb-1">Unit Kontrakan Terpilih</label>
                    <input type="text" id="unit-terpilih" readonly placeholder="Klik tombol 'Sewa' pada unit di atas" class="w-full bg-slate-50 border border-slate-200 p-2.5 rounded-xl text-sm font-medium text-indigo-600 focus:outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-600 block mb-1">Nama Lengkap Anda</label>
                    <input type="text" id="tenant-name" required placeholder="Masukkan nama lengkap Anda" class="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-600 block mb-1">No. WhatsApp Anda</label>
                    <input type="tel" id="tenant-phone" required placeholder="Contoh: 081234567xxx" class="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 text-sm">
                    <i class="fa-brands fa-whatsapp text-lg"></i> Kirim via WhatsApp ke Pemilik
                </button>
            </form>
        </div>
    </main>

    <footer class="max-w-6xl mx-auto p-4 text-center">
        <p class="text-xs text-slate-400">© 2026 KontrakanMaps<a href="admin.html" class="text-slate-50 hover:text-slate-300 transition-colors">.</a></p>
    </footer>

    <div id="detail-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-2xl rounded-2xl max-h-[90vh] overflow-y-auto shadow-2xl flex flex-col">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 sticky top-0 rounded-t-2xl z-10">
                <h3 id="modal-title" class="font-bold text-slate-800 text-base">Detail Kontrakan</h3>
                <button onclick="window.tutupModal()" class="text-slate-400 hover:text-slate-600 p-1 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <span class="text-xs font-bold text-slate-500 block mb-2">📸 Foto Unit:</span>
                    <div id="modal-gallery" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
                </div>
                <div class="space-y-2 border-t border-slate-100 pt-3">
                    <p class="text-xs text-indigo-600 font-bold" id="modal-category"></p>
                    <p class="text-xl font-black text-emerald-600" id="modal-price"></p>
                    <p class="text-xs text-slate-600 flex items-center gap-1"><i class="fa-solid fa-location-dot text-red-500"></i> <span id="modal-address"></span></p>
                    <p class="text-xs text-slate-500">📍 Koordinat: <span id="modal-lat"></span>, <span id="modal-lng"></span></p>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                        <span class="text-xs font-bold text-slate-700 block mb-1">📋 Fasilitas Lengkap:</span>
                        <p class="text-xs text-slate-600 leading-relaxed whitespace-pre-line" id="modal-desc"></p>
                    </div>
                </div>
            </div>
            <div class="p-4 border-t border-slate-100 bg-slate-50 flex gap-2 rounded-b-2xl">
                <button id="modal-btn-booking" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 shadow-md">
                    📝 Ajukan Sewa & Survei Unit Ini
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const map = L.map('map').setView([-6.3227, 107.3376], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const listContainer = document.getElementById('properties-list');
        const modal = document.getElementById('detail-modal');
        const formBooking = document.getElementById('booking-form-wa');
        const inputUnitTerpilih = document.getElementById('unit-terpilih');

        let properties = JSON.parse(localStorage.getItem('kontrakanData')) || [];

        if (properties.length === 0) {
            listContainer.innerHTML = '<p class="col-span-3 text-center text-slate-500 py-8">Belum ada unit. Tambah dulu di halaman admin.</p>';
            return;
        }

        function renderProperties() {
            listContainer.innerHTML = '';
            properties.forEach(prop => {
                const marker = L.marker([prop.lat, prop.lng]).addTo(map);
                marker.bindPopup(`<b>${prop.name}</b><br>${prop.address}<br>Rp ${Number(prop.price).toLocaleString('id-ID')}/bulan`);

                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden';
                card.innerHTML = `
                    <img src="${prop.images[0]}" class="w-full h-40 object-cover">
                    <div class="p-4">
                        <p class="text-xs text-indigo-600 font-bold">${prop.category}</p>
                        <h3 class="font-bold text-slate-800 text-sm mt-1 mb-1 truncate">${prop.name}</h3>
                        <p class="text-xs text-slate-500 mb-2 flex items-center gap-1"><i class="fa-solid fa-location-dot text-red-400"></i> ${prop.address}</p>
                        <p class="text-lg font-black text-emerald-600 mb-3">Rp ${Number(prop.price).toLocaleString('id-ID')}<span class="text-xs text-slate-500 font-normal">/bulan</span></p>
                        <div class="flex gap-2">
                            <button onclick="bukaModal(${prop.id})" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold py-2 rounded-lg">Detail</button>
                            <button onclick="pilihUnit('${prop.name}')" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2 rounded-lg">Sewa</button>
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        window.bukaModal = (id) => {
            const prop = properties.find(p => p.id === id);
            if (!prop) return;
            document.getElementById('modal-title').textContent = prop.name;
            document.getElementById('modal-category').textContent = prop.category;
            document.getElementById('modal-price').textContent = `Rp ${Number(prop.price).toLocaleString('id-ID')} / bulan`;
            document.getElementById('modal-address').textContent = prop.address;
            document.getElementById('modal-lat').textContent = prop.lat;
            document.getElementById('modal-lng').textContent = prop.lng;
            document.getElementById('modal-desc').textContent = prop.desc;
            const gallery = document.getElementById('modal-gallery');
            gallery.innerHTML = '';
            prop.images.forEach(img => {
                gallery.innerHTML += `<img src="${img}" class="w-full h-28 object-cover rounded-lg">`;
            });
            document.getElementById('modal-btn-booking').onclick = () => {
                pilihUnit(prop.name);
                tutupModal();
                document.getElementById('form-booking').scrollIntoView({ behavior: 'smooth' });
            };
            modal.classList.remove('hidden');
        };

        window.tutupModal = () => {
            modal.classList.add('hidden');
        };

        window.pilihUnit = (namaUnit) => {
            inputUnitTerpilih.value = namaUnit;
            document.getElementById('form-booking').scrollIntoView({ behavior: 'smooth' });
        };

        formBooking.addEventListener('submit', (e) => {
            e.preventDefault();
            const unit = inputUnitTerpilih.value;
            const nama = document.getElementById('tenant-name').value;
            const hp = document.getElementById('tenant-phone').value;
            if (!unit) return alert('Pilih unit dulu bang, klik tombol Sewa di unit');
            const noPemilik = '6281234567890'; // GANTI NO WA PEMILIK
            const pesan = `Halo, saya ${nama} mau booking/survei unit:\n\n*${unit}*\n\nNo WA saya: ${hp}\n\nMohon infonya ya. Terima kasih.`;
            const urlWA = `https://wa.me/${noPemilik}?text=${encodeURIComponent(pesan)}`;
            window.open(urlWA, '_blank');
        });

        renderProperties();
    });
    </script>
</body>
</html>
